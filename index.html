        const rawQuizzes = [
            // --- 2064 ---
            {id:"r3-64-q1",set:"r3-64",q:"ปริมาณรังสีที่พิจารณาถึงผลทางชีววิทยาในการปรับเทียบสภาพความไวของรังสีแต่ละเนื้อเยื่อหรืออวัยวะทั่วร่างกาย เรียกว่าอะไร",choices:["Effective dose","Absorbed dose","Exposure","Air kerma","Equivalent dose"],ans:0},
            {id:"r3-64-q2",set:"r3-64",q:"การตรวจสอบค่า HVL เป็นการตรวจสอบประสิทธิภาพของเครื่องเอกซเรย์ในด้านใด",choices:["คุณภาพลำรังสี","ความแม่นยำ","เวลา","ความเที่ยงตรง","กระแสหลอด"],ans:0},
            {id:"r3-64-q3",set:"r3-64",q:"ในการถ่ายภาพทางรังสีวินิจฉัย interaction แบบใด ที่ใช้ในการสร้างภาพ",choices:["Compton scattering เท่านั้น","Photoelectric absorption เท่านั้น","Photoelectric absorption และ Compton scattering","Coherent และ Compton scattering","Coherent scattering เท่านั้น"],ans:2},
            {id:"r3-64-q4",set:"r3-64",q:"ข้อใดเป็นอาการแสดงที่เกิดขึ้นเมื่อผู้ป่วยแพ้สารทึบรังสี (Contrast media) อย่างรุนแรง",choices:["Urticaria","Hypotension","Vomiting","Nausea","Anaphylaxis"],ans:4},
            {id:"r3-64-q5",set:"r3-64",q:"การขจัดกากกัมมันตรังสีในงานตรวจทางเวชศาสตร์นิวเคลียร์ นิยมใช้วิธีการใด",choices:["Concentration and contain","Concentration and sedimentation","Dilute and disperse","Delay and decay","Concentration and disperse"],ans:3},
            {id:"r3-64-q6",set:"r3-64",q:"ธาตุกัมมันตรังสีชนิดหนึ่งมีค่าครึ่งชีวิต 5 วัน ในเวลา 20 วัน ธาตุนี้จะสลายตัวไปกี่เปอร์เซ็นต์",choices:["6.25%","87.5%","93.75%","75.0%","12.5%"],ans:2},
            {id:"r3-64-q7",set:"r3-64",q:"คุณลักษณะที่พึงประสงค์ของเจ้าหน้าที่รังสีเทคนิค ข้อใดที่จะทำให้เข้าใจความรู้สึกของผู้ป่วย",choices:["Flexibility","Belonging","Self-awareness","Empathy","Warm"],ans:3},
            {id:"r3-64-q8",set:"r3-64",q:"หลักการพื้นฐานของการป้องกันอันตรายจากรังสี 3 ข้อ คือ Justification, Optimization และ Dose limit สำหรับนักรังสีเทคนิค ในการป้องกันอันตรายจากรังสีควรใช้หลักการในข้อใด",choices:["Optimization","Dose limit","Justification และ Optimization","Optimization และ Dose limit","Justification"],ans:3},
            {id:"r3-64-q9",set:"r3-64",q:"เครื่องมือวัดรังสีประจำตัวบุคคลใดจัดอยู่ในประเภท active monitoring",choices:["OSL badges","Film badges","Electronic pocket dosimeters","Nuclear emulsion or track etch dosimeters","TLD badges"],ans:2},
            {id:"r3-64-q10",set:"r3-64",q:"การวินิจฉัยความผิดปกติของลำไส้ใหญ่ โดยการสวนแป้ง Barium sulfate ทางทวารหนัก ห้ามทำการตรวจในผู้ป่วยที่มีอาการเช่นไร",choices:["Rectal bleeding","Intestinal perforation","Polyps","Vomiting","Nausea"],ans:1},
            {id:"r3-64-q11",set:"r3-64",q:"วัตถุประสงค์หลักของการป้องกันอันตรายจากรังสีคืออะไร",choices:["ป้องกันการเกิด Deterministic effects และลดโอกาสเกิด Stochastic effects","ป้องกันการเกิด Deterministic และ Stochastic effects","ป้องกันการเกิด Hereditary effects และลดโอกาสเกิด Somatic effects","ป้องกันการเกิด Stochastic effects และลดโอกาสเกิด Deterministic effects","ป้องกันการเกิด Somatic effects และลดโอกาสเกิด Hereditary effects"],ans:0},
            {id:"r3-64-q12",set:"r3-64",q:"Hp (0.07) ในรายงานผลบันทึกปริมาณรังสีบุคคล เป็นปริมาณรังสีที่จุดใด",choices:["ปริมาณรังสียังผลที่ผิวไหน","ปริมาณรังสียังผลที่ศีรษะ","ปริมาณรังสียังผลที่เลนส์ตา","ปริมาณรังสียังผลที่มือ","ปริมาณรังสียังผลที่เนื้อเยื่อใต้ผิวหนัง"],ans:0},
            {id:"r3-64-q13",set:"r3-64",q:"กฎกำลังสองผกผัน หมายความว่า",choices:["เมื่อเราเพิ่มระยะห่างเป็นสองเท่า อัตราปริมาณรังสีลดลงครึ่งหนึ่ง","เมื่อเราเพิ่มระยะห่างเป็นสองเท่า อัตราปริมาณรังสีจะลดลงเหลือหนึ่งในสี่","เมื่อเราเพิ่มระยะห่างเป็นสองเท่า อัตราปริมาณรังสีจะเพิ่มขึ้นครึ่งเท่า","เมื่อเราลดระยะห่างลงครึ่งหนึ่ง อัตราปริมาณรังสีจะเพิ่มขึ้นสองเท่า","เมื่อเราลดระยะห่างลงเป็นหนึ่งในสี่ อัตราปริมาณรังสีเพิ่มเป็นสองเท่า"],ans:1},
            {id:"r3-64-q14",set:"r3-64",q:"ป้ายเตือนบริเวณรังสี เป็นรูปคล้ายใบพัด ข้อใดถูกต้องที่สุด",choices:["พื้นสีม่วง รูปใบพัดสีดำ","พื้นสีม่วง รูปใบพัดสีเหลือง","พื้นสีเหลือง รูปใบพัดสีม่วง","พื้นสีขาว รูปใบพัดสีดำ","พื้นสีเหลือง รูปใบพัดสีแดง"],ans:2},
            {id:"r3-64-q15",set:"r3-64",q:"การเรืองแสงแบบ phosphorescence แตกต่างจาก fluorescence คือ",choices:["รูปแบบของพลังงานที่ดูดกลืน","ความสว่าง","ระยะเวลาระหว่างการดูดกลืนพลังงานจนกระทั่งเรืองแสง","ไม่ต่างกัน","สีของแสง"],ans:2},
            {id:"r3-64-q16",set:"r3-64",q:"ข้อใดกล่าวถูกต้องเกี่ยวการแบ่งโปรแกรมการควบคุมคุณภาพ (Quality control program) ออกเป็นระดับตามความยากง่ายและความซับซ้อนของวิธีการ",choices:["ระดับที่ 1 และ ระดับที่ 2 ถูกต้อง","ระดับที่ 3 การประเมินอย่างซับซ้อนและทำลาย (invasive and complex) โดยและเป็นวิธีที่รบกวนระบบของเครื่องเอกซเรย์ ผู้ที่ทำคือ นักฟิสิกส์หรือวิศวกรที่มีความชำนาญ","ระดับที่ 1, ระดับที่ 2 และ ระดับที่ 3 ถูกต้อง","ระดับที่ 2 การประเมินอย่างซับซ้อนและไม่ทำลาย (noninvasive and complex) เช่นการวัดปริมาณรังสีจากเครื่องเอกซเรย์ ผู้ที่ทำคือนักรังสีเทคนิคที่ผ่านการฝึกอบรมมาโดยเฉพาะ","ระดับที่ 1 การประเมินอย่างง่ายและไม่ทำลาย (noninvasive and simple) เช่นการประเมินค่าเลขซีทีเฉลี่ยของน้ำจากแฟนตอมน้ำ ผู้ที่ทำคือนักรังสีเทคนิค"],ans:2},
            {id:"r3-64-q17",set:"r3-64",q:"การผลิตเอกซเรย์ที่ใช้ในการถ่ายภาพอวัยวะภายในของผู้ป่วย สามารถทำได้โดยการใช้อะไรยิงใส่เป้า tungsten",choices:["อนุภาคอิเล็กตรอนความเร็วสูง","นิวตรอนความเร็วสูง","ความร้อนสูง","ไฟฟ้าแรงสูง","คลื่นแม่เหล็กไฟฟ้า"],ans:0},
            {id:"r3-64-q18",set:"r3-64",q:"ข้อใดเป็นผลของรังสีในระยะยาวแบบ Stochastic effects",choices:["ต้อกระจก","ผมร่วง","มะเร็ง","เป็นหมันชั่วคราว","ผิวหนังแดง, ไหม้"],ans:2},
            {id:"r3-64-q19",set:"r3-64",q:"โปรแกรมการจัดการเชิงคุณภาพ (Quality management program) ประกอบด้วยอะไรบ้าง",choices:["การส่งเสริมคุณภาพอย่างต่อเนื่อง (CQI)","การประกันคุณภาพ (QA) และ การควบคุมคุณภาพ (QC)","การประกันคุณภาพ (QA)","การประกันคุณภาพ (QA), การควบคุมคุณภาพ (QC), การส่งเสริมคุณภาพอย่างต่อเนื่อง (CQI)","การควบคุมคุณภาพ (QC)"],ans:3},
            {id:"r3-64-q20",set:"r3-64",q:"ธาตุใดต่อไปนี้มีค่าชีวิตเฉลี่ย (Mean lifetime) สูงสุด",choices:["ธาตุซีเซียม-137 มีค่าความแรงรังสีตั้งต้นเท่ากับ 10 คูรี ครึ่งชีวิต 30 วัน","ธาตุแบเรียม-140 มีค่าความแรงรังสีตั้งต้นเท่ากับ 5 คูรี ครึ่งชีวิต 12.5 วัน","ธาตุอิริเดียม-192 มีค่าความแรงรังสีตั้งต้นเท่ากับ 10 เบคเคอเรล ครึ่งชีวิต 73.8 วัน","ธาตุไอโอดีน-131 มีค่าความแรงรังสีตั้งต้นเท่ากับ 5 เบคเคอเรล ครึ่งชีวิต 8.05 วัน","ธาตุทอเรียม-234 มีค่าความแรงรังสีตั้งต้นเท่ากับ 10 คูรี ครึ่งชีวิต 24.1 วัน"],ans:2},
            {id:"r3-64-q21",set:"r3-64",q:"Interaction ชนิดใดที่ทำให้ Incident photon มีพลังงานลดลงแต่ยังคงอยู่",choices:["Pair production","Photoelectric effect","Coherent scattering","Photodisintegrations","Compton effect"],ans:4},
            {id:"r3-64-q22",set:"r3-64",q:"พิจารณาอะตอมของไฮโดรเจนของน้ำ ซึ่งวางอยู่ในที่ที่ไม่มีสนามแม่เหล็กจากภายนอกเข้าไปรบกวน ปริมาณในข้อใดต่อไปนี้มีค่าเป็นศูนย์",choices:["Kinetic energy","Atomic mass","Magnetic moment","Magnetization","Mass density"],ans:3},
            {id:"r3-64-q23",set:"r3-64",q:"สำหรับการเกิด Nuclear magnetic resonance ของนิวเคลียสไฮโดรเจน จะมีพลังงานที่นิวเคลียสของไฮโดรเจนคายออกมา พลังงานดังกล่าวนั้นจัดอยู่ในพวกใด",choices:["Microwave","Radio-frequency wave","Ultrasound","Infrared","X-ray photon"],ans:1},

            {id:"r3-66-q33",set:"r3-66",q:"การแผ่รังสีชนิดใด ไม่ได้มีแหล่งกำเนิดจากนิวเคลียส",choices:["แอลฟา","รังสีเอกซ์","นิวตรอน","เบตา","แกมมา"],ans:1},

            {id:"r3-66-q35",set:"r3-66",q:"ข้อใดคือรังสีประเภท Low LET",choices:["Beta particle","Alpha","Gamma","Proton particle","Neutron"],ans:2},
            {id:"r3-66-q36",set:"r3-66",q:"Specific activity หมายถึงข้อใด",choices:["ปริมาณของสารกัมมันตรังสีต่อมวลของสารกัมมันตรังสี","ความเข้มข้นของสารกัมมันตรังสีต่อมวลของสารกัมมันตรังสี","ความแรงรังสีของสารกัมมันตรังสีต่อมวลของสารกัมมันตรังสี","ความบริสุทธิ์ของสารกัมมันตรังสี","มวลของสารกัมมันตรังสี"],ans:2},
            {id:"r3-66-q37",set:"r3-66",q:"ข้อใดถูกต้องเกี่ยวกับค่า Half Value Layer (HVL)",choices:["เป็นค่าที่บอกถึง Beam Quality","เป็นค่าที่บอกถึง Beam Profile","เป็นค่าที่บอกถึง Beam Filtration","เป็นค่าที่บอกถึง Beam Quantity","เป็นค่าที่บอกถึง Beam Alignment"],ans:0},
            {id:"r3-66-q38",set:"r3-66",q:"ข้อใดคือผลที่ได้จากกระบวนการ Pair Production",choices:["Positron และ Electron หลุดออกจากนิวเคลียส","Positron และ Electron รอบ ๆ นิวเคลียส","Photon สองตัวมีพลังงาน 511 keV","Photon ถูกดูดกลืนโดยนิวเคลียสและมีการปลดปล่อย Positron ออกมา","Electron หลุดออกจากนิวเคลียส"],ans:2},
            {id:"r3-66-q39",set:"r3-66",q:"Key Performance Indicator (KPI) คืออะไร",choices:["วัตถุประสงค์ของการดำเนินงานในระยะเวลาสั้น ๆ","ดัชนีชี้วัดผลงานระดับองค์กร","ความสำเร็จของการดำเนินงานในขั้นตอนสุดท้าย","เกณฑ์ของแผนงานที่ต้องปฏิบัติ","หน่วยนับของเป้าหมายของการปฏิบัติงาน"],ans:1},
            {id:"r3-66-q40",set:"r3-66",q:"ข้อใดใช้ในการควบคุมคุณภาพ Display monitor ในระบบ CR และ DR",choices:["Bar pattern","High contrast test object","SMPTE test pattern","TOR RAD phantom","TOR CDR phantom"],ans:2},
            {id:"r3-66-q41",set:"r3-66",q:"ข้อใดหมายถึงอะตอมธาตุเดียวกัน (มีจำนวนโปรตอนเท่ากัน แต่เลขมวลต่างกัน)",choices:["Isomeric transition","Isobar","Isotone","Isotope","Isoelectronic"],ans:3},
            {id:"r3-66-q42",set:"r3-66",q:"IAEA และ ICRP กำหนดให้ผู้ปฏิบัติงานกับรังสีได้รับปริมาณรังสีสะสมต่อปี โดยเฉลี่ยจากการปฏิบัติงาน 5 ปี ไม่เกินเท่าไหร่",choices:["100 mGy","20 mSv","50 mGy","20 mGy","50 mSv"],ans:1},
            {id:"r3-66-q43",set:"r3-66",q:"การตรวจ CT-scan กรณีที่มีการฉีด Contrast media ในผู้ป่วยที่มีค่า eGFR น้อยกว่า 60 mL/min/1.73 m² และมีความจำเป็นจะต้องฉีด ยากลุ่มใดที่รังสีแพทย์จะพิจารณาเลือกใช้เพื่อลดความเสี่ยงต่อไตมากที่สุด",choices:["Low-osmolar contrast media","Ionic dimer contrast media","Iso-osmolar contrast media","Ionic monomer contrast media","High-osmolar contrast media"],ans:2},
            {id:"r3-66-q44",set:"r3-66",q:"กระบวนการทางฟิสิกส์ชนิดใดเกิดขึ้นเมื่อรังสีถูกดูดกลืนโดยเนื้อเยื่อของร่างกายระหว่างถ่ายภาพรังสีวินิจฉัย (ทำให้เกิด Contrast บนภาพ)",choices:["Compton effect","Photoelectric absorption","Disintegration","Annihilation reaction","Pair production"],ans:1},
            {id:"r3-66-q45",set:"r3-66",q:"หน่วยของปริมาณรังสีดูดกลืน (Absorbed dose) ตามระบบ SI คือข้อใด",choices:["Rad","Roentgen","Gray","Rem","Sievert"],ans:2},
            {id:"r3-66-q46",set:"r3-66",q:"เมื่อตัวอ่อนในครรภ์ได้รับรังสีปริมาณสูงในช่วง Pre-implantation stage ความผิดปกติที่พบมากที่สุดคือข้อใด",choices:["Pre-leukemic induction","Neonatal death","Mental retardation","Prenatal death","Congenital abnormality"],ans:3},
            {id:"r3-66-q47",set:"r3-66",q:"ความแตกต่างระหว่างรังสีเอกซ์ (X-ray) และ รังสีแกมมา (Gamma ray) คือข้อใด",choices:["X-ray มีมวล Gamma ray ไม่มีมวล","X-ray มีประจุ Gamma ray ไม่มีประจุ","แหล่งกำเนิด โดย X-ray เกิดที่ชั้นอิเล็กตรอน ส่วน Gamma ray เกิดที่นิวเคลียสของอะตอม","X-ray มีประจุลบ Gamma ray มีประจุบวก","แหล่งกำเนิด โดย X-ray เกิดที่นิวเคลียส ส่วน Gamma ray เกิดที่ชั้นอิเล็กตรอนของอะตอม"],ans:2},
            {id:"r3-66-q48",set:"r3-66",q:"ข้อใด ไม่เป็นไป ตามมาตรฐาน กฎระเบียบ ข้อบังคับของห้องเอกซเรย์แผนกรังสี และ Diagnostic imaging service",choices:["ความหนาของผนังห้องได้มาตรฐานตามที่กรมวิทยาศาสตร์การแพทย์ระบุไว้","เครื่องเอกซเรย์ทุกเครื่องต้องผ่านการตรวจสอบความถูกต้อง ความปลอดภัย และความแม่นยำ โดยกรมวิทยาศาสตร์การแพทย์","การออกแบบห้องเอกซเรย์ สามารถเข้าออกได้สะดวก เมื่อเกิดปัญหาคนข้างนอกสามารถเปิดเข้าได้ทันที (โดยไม่มีระบบล็อกที่แน่นหนาหรือสัญญาณเตือนภัยรังสี)","บริเวณพื้นที่ให้บริการปลอดภัยจากรังสี ต้องมีสัญลักษณ์บ่งบอกว่าเป็นเขตบริเวณรังสีชัดเจน","ห้องตรวจได้รับการออกแบบโครงสร้างในการป้องกันอันตรายจากรังสี รวมถึงอุปกรณ์ป้องกันที่ผ่านการตรวจสอบจากกรมวิทยาศาสตร์การแพทย์"],ans:2},
            {id:"r3-66-q49",set:"r3-66",q:"เครื่องมือที่ใช้ตรวจวัดการเปรอะเปื้อนของสารกัมมันตรังสี (Radiation contamination) ได้ดีที่สุดคือข้อใด",choices:["Geiger Muller detector","Proportional detector","Solid state detector","Liquid scintillation detector","Ionization detector"],ans:0},
            {id:"r3-66-q50",set:"r3-66",q:"ข้อใดต่อไปนี้เป็นเป้าหมายสำคัญ (Critical target) ในการเกิดความเสียหายของเซลล์หลังจากได้รับรังสี",choices:["Cell membrane","DNA","Ribosome","Mitochondria","Cytoplasm"],ans:1}
        ];

        // --- FIREBASE SETUP MODE ---
        // แปะคีย์จริงตรงนี้เพื่อเชื่อมต่อระบบฐานข้อมูลคลาวด์แบบ Realtime
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            databaseURL: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        let db = null;
        let isFirebaseActive = false;

        if (firebaseConfig.databaseURL) {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                isFirebaseActive = true;
                console.log("☁️ Connected to Firebase Realtime Database successfully.");
            } catch (e) {
                console.error("Firebase Initialization failed, switching to Local Memory Simulation mode.", e);
            }
        }

        // --- APP STATE ---
        let currentQuizData = JSON.parse(JSON.stringify(rawQuizzes)); 
        let userAnswers = {}; // { quizId: selectedIndex }
        let isRandomized = false;
        
        // ข้อมูลจำลองเมื่อไม่มี Firebase
        let localCloudUpdates = {}; // { quizId: { ans: index, updatedBy: string } }

        // --- DOM ELEMENTS ---
        const quizContainer = document.getElementById('quizContainer');
        const setSelector = document.getElementById('setSelector');
        const btnRandom = document.getElementById('btnRandom');

        // --- INIT APP ---
        window.addEventListener('DOMContentLoaded', () => {
            if (isFirebaseActive) {
                // ดึงข้อมูล Realtime sync จาก Firebase เพื่ออัปเดตเฉลย
                db.ref('quizzes').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        Object.keys(data).forEach(qId => {
                            const cloudItem = data[qId];
                            localCloudUpdates[qId] = cloudItem;
                            // ซิงค์ลงใน data Array หลัก
                            const found = currentQuizData.find(x => x.id === qId);
                            if (found) {
                                found.ans = cloudItem.ans;
                                found.updatedBy = cloudItem.updatedBy;
                            }
                        });
                        renderQuiz();
                    }
                });
            } else {
                renderQuiz();
            }
        });

        // --- FILTER & RENDER ---
        setSelector.addEventListener('change', () => {
            isRandomized = false; 
            btnRandom.classList.remove('bg-purple-600', 'hover:bg-purple-700');
            btnRandom.classList.add('bg-amber-500', 'hover:bg-amber-600');
            resetDataState();
        });

        function resetDataState() {
            // โหลดข้อมูลดิบใหม่
            currentQuizData = JSON.parse(JSON.stringify(rawQuizzes));
            // ปลั๊กอินคลาวด์/เมมโมรี่จำลอง
            Object.keys(localCloudUpdates).forEach(qId => {
                const found = currentQuizData.find(x => x.id === qId);
                if (found) {
                    found.ans = localCloudUpdates[qId].ans;
                    found.updatedBy = localCloudUpdates[qId].updatedBy;
                }
            });
            renderQuiz();
        }

        function renderQuiz() {
            const currentFilter = setSelector.value;
            let listToRender = currentQuizData;

            if (currentFilter !== 'all') {
                listToRender = currentQuizData.filter(item => item.set === currentFilter);
            }

            if (listToRender.length === 0) {
                quizContainer.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl border text-slate-400 font-medium">ไม่พบข้อสอบในชุดนี้</div>`;
                return;
            }

            quizContainer.innerHTML = '';

            listToRender.forEach((item, index) => {
                const quizBox = document.createElement('div');
                quizBox.className = "bg-white rounded-2xl p-5 sm:p-6 shadow-sm border border-slate-200/80 transition-all hover:shadow-md relative overflow-hidden";
                quizBox.id = `box-${item.id}`;

                // Header ข้อสอบ
                const labelYear = item.set === 'r3-64' ? 'ปี 2564' : item.set === 'r3-65' ? 'ปี 2565' : 'ปี 2566';
                let headerHtml = `
                    <div class="flex justify-between items-start gap-4 mb-3">
                        <span class="inline-flex items-center gap-1 bg-blue-50 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-md border border-blue-100">
                            <i class="fa-solid fa-graduation-cap"></i> ข้อที่ ${index + 1} (${labelYear})
                        </span>
                        <button onclick="openEditModal('${item.id}')" class="text-xs font-semibold text-slate-400 hover:text-cyan-600 transition-colors flex items-center gap-1 bg-slate-50 hover:bg-cyan-50 border border-slate-200 px-2 py-1 rounded-lg">
                            <i class="fa-solid fa-pen-to-square"></i> แก้ไขเฉลยต้นฉบับ
                        </button>
                    </div>
                    <h2 class="text-base sm:text-lg font-semibold text-slate-800 leading-relaxed mb-3">${item.q}</h2>
                `;

                // การจัดการรูปภาพประจำข้อ (ดักจับฟิลด์ img)
                if (item.img && item.img.trim() !== '') {
                    headerHtml += `
                        <div class="my-3 text-center">
                            <img src="${item.img}" alt="รูปภาพประจำข้อที่ ${index + 1}" class="max-h-64 mx-auto rounded-lg shadow-sm border bg-slate-50 object-contain">
                        </div>
                    `;
                }

                // Render ช้อยส์ตัวเลือก
                let choicesHtml = `<div class="space-y-2.5 mt-4">`;
                const userChoice = userAnswers[item.id];
                
                item.choices.forEach((choice, cIdx) => {
                    let btnStyle = "border-slate-200 hover:bg-slate-50 text-slate-700 bg-white";
                    let iconHtml = `<div class="w-6 h-6 rounded-full border border-slate-300 flex items-center justify-center text-xs font-bold text-slate-400 bg-slate-50 shrink-0">${cIdx + 1}</div>`;

                    if (userChoice !== undefined) {
                        // เมื่อมีการคลิกตรวจปั๊บ
                        if (cIdx === item.ans) {
                            // ข้อที่เฉลยถูกต้อง
                            btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-900 font-medium ring-1 ring-emerald-500";
                            iconHtml = `<div class="w-6 h-6 rounded-full bg-emerald-500 flex items-center justify-center text-xs font-bold text-white shrink-0"><i class="fa-solid fa-check"></i></div>`;
                        } else if (cIdx === userChoice) {
                            // ข้อที่ผู้ใช้ตอบผิด
                            btnStyle = "border-red-400 bg-red-50 text-red-900 ring-1 ring-red-400";
                            iconHtml = `<div class="w-6 h-6 rounded-full bg-red-500 flex items-center justify-center text-xs font-bold text-white shrink-0"><i class="fa-solid fa-xmark"></i></div>`;
                        } else {
                            // ช้อยส์อื่นๆ ปรับความโปร่งแสงลงตามเงื่อนไข
                            btnStyle = "border-slate-200 text-slate-400 opacity-60 bg-white pointer-events-auto";
                        }
                    }

                    choicesHtml += `
                        <button onclick="selectAnswer('${item.id}', ${cIdx})" class="w-full text-left p-3.5 rounded-xl border text-sm sm:text-base flex items-center gap-3 transition-all duration-150 active:scale-[0.99] ${btnStyle}">
                            ${iconHtml}
                            <span class="flex-1 leading-normal">${choice}</span>
                        </button>
                    `;
                });
                choicesHtml += `</div>`;

                // แถบเฉลยสั้นๆ แบบกล่องสีฟ้าใต้ช้อยส์ที่เลือกแล้ว
                let feedbackHtml = '';
                if (userChoice !== undefined) {
                    feedbackHtml = `
                        <div class="mt-4 p-3 bg-cyan-50 border border-cyan-100 rounded-xl text-cyan-800 text-sm font-bold flex items-center gap-2">
                            <i class="fa-solid fa-lightbulb text-cyan-500"></i> เฉลยคือข้อ ${item.ans + 1}
                        </div>
                    `;
                }

                // ประวัติคลาวด์อัปเดตเฉลยโดย (ไม่แสดงวันเวลา)
                let cloudUpdateHtml = '';
                if (item.updatedBy) {
                    cloudUpdateHtml = `
                        <div class="mt-3 text-right">
                            <span class="inline-block text-[11px] text-slate-400 bg-slate-100 px-2 py-0.5 rounded">
                                <i class="fa-solid fa-cloud text-blue-400 mr-0.5"></i> คลาวด์อัปเดตเฉลยโดย: คุณ ${item.updatedBy}
                            </span>
                        </div>
                    `;
                }

                quizBox.innerHTML = headerHtml + choicesHtml + feedbackHtml + cloudUpdateHtml;
                quizContainer.appendChild(quizBox);
            });
        }

        // --- ANSWER SELECTION SYSTEM (เปลี่ยนช้อยส์ไปมาได้อิสระ) ---
        function selectAnswer(quizId, choiceIndex) {
            userAnswers[quizId] = choiceIndex;
            renderQuiz();
        }

        // --- RANDOM MODE SYSTEM ---
        btnRandom.addEventListener('click', () => {
            isRandomized = true;
            btnRandom.classList.remove('bg-amber-500', 'hover:bg-amber-600');
            btnRandom.classList.add('bg-purple-600', 'hover:bg-purple-700');

            // 1. สุ่มสลับโจทย์หลักทั้งหมด
            for (let i = currentQuizData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentQuizData[i], currentQuizData[j]] = [currentQuizData[j], currentQuizData[i]];
            }

            // 2. สับช้อยส์ภายในข้ออย่างแม่นยำ และแปลงค่า Index เฉลยใหม่ไม่ให้หลุดตำแหน่ง
            currentQuizData.forEach(item => {
                // เก็บอาเรย์ออบเจกต์จำค่าดั้งเดิมไว้
                let mappedChoices = item.choices.map((c, index) => {
                    return { text: c, isCorrect: index === item.ans };
                });

                // สุ่มสับช้อยส์ 1-5
                for (let i = mappedChoices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [mappedChoices[i], mappedChoices[j]] = [mappedChoices[j], mappedChoices[i]];
                }

                // สรุปข้อมูลกลับคืนลงออบเจกต์
                item.choices = mappedChoices.map(x => x.text);
                item.ans = mappedChoices.findIndex(x => x.isCorrect); // หาตำแหน่งดัชนีเฉลยใหม่แม่นยำ
            });

            renderQuiz();
        });

        // --- MODAL & FIREBASE DATABASE WRITE SYSTEM ---
        function openEditModal(quizId) {
            // ดึงข้อความและช้อยส์ดั้งเดิมจากฐานข้อมูลดิบ เพื่อป้องกันไม่ให้ผู้แก้ไขสับสนเวลาสุ่มช้อยส์อยู่
            const originalItem = rawQuizzes.find(x => x.id === quizId);
            const liveItem = currentQuizData.find(x => x.id === quizId);
            if (!originalItem || !liveItem) return;

            document.getElementById('modalTargetId').value = quizId;
            document.getElementById('modalQuestionText').innerText = originalItem.q;
            
            const container = document.getElementById('modalChoicesContainer');
            container.innerHTML = '';

            // ใช้โครงสร้างลำดับช้อยส์ดั้งเดิมเสมอในการอัปเดต
            originalItem.choices.forEach((choice, index) => {
                // ค้นหาว่า ณ ปัจจุบัน ข้อนี้ถูกเฉลยไว้ที่ดัชนีไหนในเวอร์ชันดิบ
                const isSelected = index === originalItem.ans; 
                container.innerHTML += `
                    <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer text-sm font-medium transition-colors">
                        <input type="radio" name="modalAnsRadio" value="${index}" ${isSelected ? 'checked' : ''} class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                        <span class="text-slate-700">${index + 1}. ${choice}</span>
                    </label>
                `;
            });

            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.children[0].classList.remove('scale-95');
                modal.children[0].classList.add('scale-100');
            }, 50);
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.children[0].classList.remove('scale-100');
            modal.children[0].classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 150);
        }

        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const quizId = document.getElementById('modalTargetId').value;
            const newAnsIndex = parseInt(document.querySelector('input[name="modalAnsRadio"]:checked').value);
            const editorNameStr = document.getElementById('editorName').value.trim();

            if (!editorNameStr) return;

            const updatePayload = {
                ans: newAnsIndex,
                updatedBy: editorNameStr
            };

            // อัปเดตในอาเรย์ข้อมูลต้นฉบับดั้งเดิม (รักษาสิทธิ์ของโครงสร้างดิบ)
            const originIndex = rawQuizzes.findIndex(x => x.id === quizId);
            if (originIndex !== -1) {
                rawQuizzes[originIndex].ans = newAnsIndex;
                rawQuizzes[originIndex].updatedBy = editorNameStr;
            }

            if (isFirebaseActive) {
                // ยิงข้อมูลอัปเดตลงคลาวด์ Firebase แบบเรียลไทม์
                db.ref(`quizzes/${quizId}`).set(updatePayload)
                    .then(() => {
                        alert("🎉 อัปเดตข้อมูลเฉลยขึ้น Firebase คลาวด์เรียบร้อยแล้ว!");
                        closeEditModal();
                    })
                    .catch((err) => {
                        alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลคลาวด์: " + err.message);
                    });
            } else {
                // ทำงานบนเบราว์เซอร์ชั่วคราวกรณีไม่ได้แปะคีย์ Firebase
                localCloudUpdates[quizId] = updatePayload;
                
                // ซิงค์เข้าสู่โครงสร้างการทำงานหน้าปัจจุบัน
                const liveItem = currentQuizData.find(x => x.id === quizId);
                if (liveItem) {
                    // หากอยู่ในโหมดสุ่ม ต้องประมวลผลคำตอบใหม่ให้ตรงกับช้อยส์ที่สับไปแล้ว
                    if (isRandomized) {
                        const originalItem = rawQuizzes.find(x => x.id === quizId);
                        const correctText = originalItem.choices[newAnsIndex];
                        const newLiveIndex = liveItem.choices.indexOf(correctText);
                        liveItem.ans = newLiveIndex;
                    } else {
                        liveItem.ans = newAnsIndex;
                    }
                    liveItem.updatedBy = editorNameStr;
                }

                alert("💾 บันทึกจำลองในความจำเบราว์เซอร์สำเร็จ (ไม่ได้ระบุบัญชีเชื่อมต่อ Firebase Config)");
                closeEditModal();
                renderQuiz();
            }
        });
    </script>
</body>
